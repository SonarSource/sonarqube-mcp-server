name: Build

on:
  push:
    branches:
      - master
      - branch-*
      - dogfood-*
  pull_request:
  merge_group:
  workflow_dispatch:

# Workflow-level concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

# Required permissions for Vault OIDC and repo operations
permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: sonar-s
    name: Build
    outputs:
      PROJECT_VERSION: ${{ steps.build-step.outputs.project-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.4.20

      - id: build-step
        uses: SonarSource/ci-github-actions/build-gradle@2e3882b962944f14568afd6c3578a62c47616a60 # 1.5.1
        with:
          deploy-pull-request: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          sonar-platform: sqc-eu
          gradle-args: :cyclonedxBom jacocoTestReport
          use-develocity: true

  integration:
    needs: [build]
    runs-on: github-ubuntu-latest-m
    name: IT - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: STDIO
            test_class: StdioTransportITest
            sonarcloud: false
          - name: HTTP
            test_class: HttpTransportITest
            sonarcloud: false
          - name: ProxiedServer
            test_class: ProxiedServerITest
            sonarcloud: false
          - name: SonarQubeCloud
            sonarcloud: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.4.20

      - name: Vault (SonarCloud IT token)
        id: secrets-sc
        uses: SonarSource/vault-action-wrapper@0a3114fe1230b784c35b53b099f9ab1f1e538cc7 # 3.5.0
        with:
          secrets: |
            development/team/sonarlint/kv/data/sonarcloud-it token | SONARCLOUD_IT_TOKEN;
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - name: Install Maven
        if: matrix.sonarcloud == true
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Download plugin from Artifactory
        if: matrix.sonarcloud != true
        env:
          ARTIFACTORY_URL: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_URL || '' }}
          ARTIFACTORY_PRIVATE_USERNAME: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_USER || '' }}
          ARTIFACTORY_PRIVATE_PASSWORD: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_ACCESS_TOKEN || '' }}
          PROJECT_VERSION: ${{ needs.build.outputs.PROJECT_VERSION }}
        run: |
          set -euo pipefail
          echo "Using project version: ${PROJECT_VERSION}"
          DOWNLOAD_URL="${ARTIFACTORY_URL}/sonarsource-public-qa/org/sonarsource/sonarqube/mcp/server/sonarqube-mcp-server/${PROJECT_VERSION}/sonarqube-mcp-server-${PROJECT_VERSION}.jar"
          
          curl -fsSL -u "${ARTIFACTORY_PRIVATE_USERNAME}:${ARTIFACTORY_PRIVATE_PASSWORD}" \
            -o sonarqube-mcp-server.jar \
            "${DOWNLOAD_URL}"
          
          mkdir -p ${GITHUB_WORKSPACE}/downloaded-plugin
          mv sonarqube-mcp-server.jar ${GITHUB_WORKSPACE}/downloaded-plugin/

      - name: Run Docker integration tests
        if: matrix.sonarcloud != true
        env:
          SONARCLOUD_IT_TOKEN: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).SONARCLOUD_IT_TOKEN || '' }}
          ARTIFACTORY_URL: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_URL || '' }}
          ARTIFACTORY_USER: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_USER || '' }}
          ARTIFACTORY_ACCESS_TOKEN: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_ACCESS_TOKEN || '' }}
          DOWNLOADED_JAR_PATH: ${{ github.workspace }}/downloaded-plugin/sonarqube-mcp-server.jar
        run: |
          ./gradlew :its:integrationTest --tests "*${{ matrix.test_class }}" --info

      - name: Run SonarQube Cloud staging integration tests
        if: matrix.sonarcloud == true
        env:
          SONARCLOUD_IT_TOKEN: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).SONARCLOUD_IT_TOKEN || '' }}
          ARTIFACTORY_URL: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_URL || '' }}
          ARTIFACTORY_USER: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_USER || '' }}
          ARTIFACTORY_ACCESS_TOKEN: ${{ steps.secrets-sc.outputs.vault && fromJSON(steps.secrets-sc.outputs.vault).ARTIFACTORY_ACCESS_TOKEN || '' }}
        run: |
          if [ -z "${SONARCLOUD_IT_TOKEN}" ]; then
            echo "::warning::SONARCLOUD_IT_TOKEN not available (e.g. fork PR); skipping SonarQube Cloud staging ITS"
            exit 0
          fi
          ./gradlew :its:sonarCloudIntegrationTest --info

  promote:
    needs: [build, integration]
    runs-on: github-ubuntu-latest-s  # Public repository runner
    name: Promote
    steps:
      - uses: SonarSource/ci-github-actions/promote@2e3882b962944f14568afd6c3578a62c47616a60 # 1.5.1
        with:
          promote-pull-request: true
