name: Shadow scans
on:
  schedule:
    # Run the workflow every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: github-ubuntu-latest-s
    name: Scan on shadow platforms
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.4.20
      - uses: SonarSource/ci-github-actions/build-gradle@1ea2cea521e6c74144d9fc6053e854d6d8e5b379 # 1.5.4
        with:
          run-shadow-scans: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          gradle-args: ":jacocoTestReport"
      - name: Run IRIS Analysis
        uses: SonarSource/unified-dogfooding-actions/run-iris@54cee68ff08f10645c757675c59d232063e0b947 # 1.0.0
        with:
          primary_project_key: "SonarSource_sonarqube-mcp-server"
          primary_platform: "SQC-EU"
          shadow1_project_key: "SonarSource_sonarqube-mcp-server"
          shadow1_platform: "Next"
          shadow2_project_key: "SonarSource_sonarqube-mcp-server"
          shadow2_platform: "SQC-US"
